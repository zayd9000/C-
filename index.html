<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Car Price Index</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #030712;
            color: #f3f4f6;
            -webkit-tap-highlight-color: transparent;
        }
        input, select, textarea {
            background-color: #0b0f19;
            border: 1px solid #1f293d;
            color: #ffffff;
            border-radius: 6px;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #eab308;
        }
    </style>
</head>
<body class="p-4 max-w-md mx-auto pb-12">

    <!-- Mobile App Header -->
    <header class="flex justify-between items-center mb-6 pt-2">
        <div>
            <h1 class="text-lg font-bold tracking-tight text-white"><span class="text-yellow-500">NEXUS</span> AUTO</h1>
            <p class="text-[11px] text-gray-500 tracking-wide">Personal Dealership Price Log</p>
        </div>
        <span class="text-[10px] bg-emerald-950 text-emerald-400 font-semibold px-2 py-0.5 rounded border border-emerald-900">
            Auto-Save On
        </span>
    </header>

    <!-- Entry Mobile Form Box -->
    <div class="bg(#0b0f19) border border(#1f293d) p-4 rounded-xl space-y-4 mb-6" style="background-color: #0b0f19; border-color: #1f293d;">
        
        <!-- Car Brand & Name -->
        <div class="grid grid-cols-2 gap-3">
            <div>
                <label class="block text-[10px] uppercase tracking-wider text-gray-400 mb-1 font-semibold">Car Brand</label>
                <input type="text" id="brand" placeholder="e.g. Toyota" class="w-full px-3 py-2 text-sm">
            </div>
            <div>
                <label class="block text-[10px] uppercase tracking-wider text-gray-400 mb-1 font-semibold">Car Name</label>
                <input type="text" id="name" placeholder="e.g. Camry" class="w-full px-3 py-2 text-sm">
            </div>
        </div>

        <!-- Hybrid Switch & Cylinders Selection -->
        <div class="grid grid-cols-2 gap-3">
            <div>
                <label class="block text-[10px] uppercase tracking-wider text-gray-400 mb-1 font-semibold">Type</label>
                <select id="hybrid" class="w-full px-3 py-2 text-sm">
                    <option value="Not Hybrid">Not Hybrid</option>
                    <option value="Hybrid">Hybrid</option>
                </select>
            </div>
            <div>
                <label class="block text-[10px] uppercase tracking-wider text-gray-400 mb-1 font-semibold">Engine</label>
                <select id="engine" class="w-full px-3 py-2 text-sm">
                    <option value="V4">V4</option>
                    <option value="V6">V6</option>
                    <option value="V8">V8</option>
                </select>
            </div>
        </div>

        <!-- Year & Kilometers -->
        <div class="grid grid-cols-2 gap-3">
            <div>
                <label class="block text-[10px] uppercase tracking-wider text-gray-400 mb-1 font-semibold">Year</label>
                <input type="number" id="year" placeholder="2025" class="w-full px-3 py-2 text-sm">
            </div>
            <div>
                <label class="block text-[10px] uppercase tracking-wider text-gray-400 mb-1 font-semibold">Kilometer</label>
                <input type="number" id="km" placeholder="e.g. 45000" class="w-full px-3 py-2 text-sm">
            </div>
        </div>

        <!-- Crash Options Toggle Layout -->
        <div>
            <label class="block text-[10px] uppercase tracking-wider text-gray-400 mb-1 font-semibold">Crash Option</label>
            <select id="crash-toggle" onchange="toggleCrashInput()" class="w-full px-3 py-2 text-sm mb-2">
                <option value="No">No Crash</option>
                <option value="Yes">Yes</option>
            </select>
            <input type="text" id="crash-details" placeholder="If yes, what? (e.g. right fender painted)" class="w-full px-3 py-2 text-xs hidden">
        </div>

        <!-- Manual Type Prices Block -->
        <div class="grid grid-cols-2 gap-3 pt-2 border-t border-gray-800">
            <div>
                <label class="block text-[10px] uppercase tracking-wider text-emerald-400 mb-1 font-semibold">Price (USD)</label>
                <input type="number" id="usd" placeholder="$" class="w-full px-3 py-2 text-sm font-bold text-emerald-400">
            </div>
            <div>
                <label class="block text-[10px] uppercase tracking-wider text-yellow-500 mb-1 font-semibold">Price (IQD)</label>
                <input type="number" id="iqd" placeholder="IQD" class="w-full px-3 py-2 text-sm font-bold text-yellow-500">
            </div>
        </div>

        <!-- Add Button -->
        <button onclick="addCar()" class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-2.5 text-sm rounded-md transition-colors mt-2">
            Save Entry
        </button>
    </div>

    <!-- Live Saved Entries Feed Display -->
    <div class="space-y-3">
        <div class="flex justify-between items-center px-1">
            <h3 class="text-xs uppercase tracking-widest text-gray-400 font-bold">Saved Records</h3>
            <span id="count" class="text-[10px] text-gray-600 font-semibold">0 Cars</span>
        </div>
        <div id="list" class="space-y-2">
            <!-- Cars show up here -->
        </div>
    </div>

    <script>
        let database = JSON.parse(localStorage.getItem('phone_car_records')) || [];

        window.onload = () => { renderList(); };

        function toggleCrashInput() {
            const toggle = document.getElementById('crash-toggle').value;
            const detailInput = document.getElementById('crash-details');
            if(toggle === 'Yes') {
                detailInput.classList.remove('hidden');
            } else {
                detailInput.classList.add('hidden');
                detailInput.value = '';
            }
        }

        function addCar() {
            const brand = document.getElementById('brand').value.trim();
            const name = document.getElementById('name').value.trim();
            const hybrid = document.getElementById('hybrid').value;
            const engine = document.getElementById('engine').value;
            const year = document.getElementById('year').value;
            const km = document.getElementById('km').value;
            const crashToggle = document.getElementById('crash-toggle').value;
            const crashDetails = document.getElementById('crash-details').value.trim();
            const usd = document.getElementById('usd').value;
            const iqd = document.getElementById('iqd').value;

            if(!brand || !name) return alert("Please fill out Car Brand and Name!");

            const carItem = {
                id: Date.now(),
                brand, name, hybrid, engine, year, km,
                crash: crashToggle === 'Yes' ? crashDetails : 'No Crash',
                usd: usd ? parseFloat(usd).toLocaleString() : '0',
                iqd: iqd ? parseFloat(iqd).toLocaleString() : '0'
            };

            database.unshift(carItem);
            localStorage.setItem('phone_car_records', JSON.stringify(database));
            
            // Clear inputs
            document.getElementById('brand').value = '';
            document.getElementById('name').value = '';
            document.getElementById('year').value = '';
            document.getElementById('km').value = '';
            document.getElementById('crash-toggle').value = 'No';
            document.getElementById('crash-details').value = '';
            document.getElementById('usd').value = '';
            document.getElementById('iqd').value = '';
            toggleCrashInput();

            renderList();
        }

        function removeCar(id) {
            database = database.filter(car => car.id !== id);
            localStorage.setItem('phone_car_records', JSON.stringify(database));
            renderList();
        }

        function renderList() {
            const listEl = document.getElementById('list');
            document.getElementById('count').innerText = `${database.length} Cars`;

            if(database.length === 0) {
                listEl.innerHTML = `<p class="text-xs text-center text-gray-600 italic py-6">No prices saved yet.</p>`;
                return;
            }

            listEl.innerHTML = database.map(car => `
                <div class="p-3 rounded-lg border relative ${car.crash !== 'No Crash' ? 'border-rose-950 bg-rose-950/10' : 'border-gray-900 bg-gray-950/40'}">
                    <button onclick="removeCar(${car.id})" class="absolute top-2 right-3 text-gray-600 text-xs">✕</button>
                    
                    <div class="flex justify-between items-start pr-4">
                        <div>
                            <h4 class="text-sm font-bold text-white">${car.brand} ${car.name} <span class="text-gray-500 font-normal text-xs">(${car.year})</span></h4>
                            <p class="text-[11px] text-gray-400 mt-0.5 font-medium">${car.hybrid} • ${car.engine} • ${car.km} KM</p>
                        </div>
                        <div class="text-right flex flex-col items-end">
                            <span class="text-sm font-bold text-emerald-400">$${car.usd}</span>
                            <span class="text-xs text-yellow-500 font-semibold">${car.iqd} IQD</span>
                        </div>
                    </div>
                    
                    <div class="mt-2 text-[11px] border-t border-gray-900/60 pt-1.5">
                        ${car.crash !== 'No Crash' ? `<span class="text-rose-400 font-semibold">⚠️ Crash:</span> <span class="text-gray-400">${car.crash}</span>` : `<span class="text-emerald-500 font-semibold">✓ No Crash</span>`}
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
